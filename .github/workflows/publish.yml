name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_version="$(python -c 'from collector import VERSION; print(VERSION)')"
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version ${package_version}" >&2
            exit 1
          fi

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Build distributions
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Smoke-test wheel
        shell: bash
        run: |
          python -m pip install --force-reinstall dist/*.whl
          [[ "$(claude-usage --version)" == "${GITHUB_REF_NAME#v}" ]]

      - uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/claude-usage-tui
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "${GITHUB_REF_NAME}"
          --repo "${GITHUB_REPOSITORY}"
          --verify-tag
          --generate-notes
          dist/*
